
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{max-width:980px;margin:0 auto;padding:1rem 0;font-family:var(--font-sans)}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{padding:8px 18px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary);font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px}
select,input[type=date],input[type=number],input[type=text]{height:36px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;width:100%}
.btn{height:36px;padding:0 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;background:none;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:0.85}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}.btn-wa:hover{background:#1da851}
.btn-img{background:#4f46e5;color:#fff;border-color:#4f46e5}.btn-img:hover{background:#4338ca}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px}
.badge-ok{background:var(--color-background-success);color:var(--color-text-success)}
.badge-miss{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-partial{background:var(--color-background-warning);color:var(--color-text-warning)}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.metric-num{font-size:24px;font-weight:500;color:var(--color-text-primary)}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1.25rem}
.filter-bar>div{flex:1;min-width:140px}
.slot-header{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-align:center;padding:6px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:8px}
.item-row{display:grid;grid-template-columns:180px repeat(3,1fr);gap:8px;align-items:center;margin-bottom:8px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 18px;border-radius:var(--border-radius-md);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.miss-card{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);margin-bottom:6px;gap:12px;flex-wrap:wrap}
.report-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem}
.report-title-bar{padding:10px 16px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center}
.report-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
table.report{width:100%;border-collapse:collapse;font-size:13px}
table.report th{padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);font-weight:500;background:var(--color-background-secondary);text-align:left}
table.report td{padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
table.report tr:last-child td{border-bottom:none}
table.report tr.total-row td{font-weight:500;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-secondary)}
table.report tr.zero td{color:var(--color-text-secondary)}
</style>

<div class="app">
  <div style="margin-bottom:1.5rem">
    <p style="font-size:22px;font-weight:500;color:var(--color-text-primary)">Stock Entry System</p>
    <p style="font-size:14px;color:var(--color-text-secondary);margin-top:4px">Entry times: 1:00 PM · 7:00 PM · 10:00 PM</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('entry')">Entry Form</button>
    <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="switchTab('finalreport')">Final Report</button>
    <button class="tab" onclick="switchTab('missing')">Missing Entries</button>
  </div>

  <!-- ENTRY FORM -->
  <div id="entry" class="section active">
    <div class="card">
      <p style="font-size:15px;font-weight:500;margin-bottom:14px">Branch & Date</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Branch Name</label><select id="branch-select"><option value="">— Select branch —</option></select></div>
        <div><label>Date</label><input type="date" id="entry-date"></div>
      </div>
    </div>
    <div class="card">
      <p style="font-size:15px;font-weight:500;margin-bottom:14px">Stock Quantities</p>
      <div style="display:grid;grid-template-columns:180px repeat(3,1fr);gap:8px;margin-bottom:12px">
        <div></div>
        <div class="slot-header">1:00 PM</div>
        <div class="slot-header">7:00 PM</div>
        <div class="slot-header">10:00 PM</div>
      </div>
      <div id="items-container"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="clearForm()">Clear</button>
      <button class="btn btn-primary" onclick="submitEntry()">Submit Entry</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="section">
    <div class="filter-bar">
      <div><label>Date</label><input type="date" id="dash-date" onchange="renderDashboard()"></div>
      <div><label>Item</label><select id="dash-item" onchange="renderDashboard()"><option value="all">All Items</option></select></div>
      <div><label>Branch</label><select id="dash-branch" onchange="renderDashboard()"><option value="all">All Branches</option></select></div>
      <div><label>Time Slot</label>
        <select id="dash-slot" onchange="renderDashboard()">
          <option value="all">All Slots</option>
          <option value="s1">1:00 PM</option>
          <option value="s2">7:00 PM</option>
          <option value="s3">10:00 PM</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem" id="metric-cards"></div>
    <div class="report-wrap"><div style="overflow-x:auto"><table class="report"><thead><tr id="dash-head"></tr></thead><tbody id="dash-body"></tbody></table></div></div>
    <div id="branch-breakdown" style="margin-top:1rem"></div>
  </div>

  <!-- FINAL REPORT -->
  <div id="finalreport" class="section">
    <div class="filter-bar">
      <div><label>Date</label><input type="date" id="rep-date" onchange="renderReport()"></div>
      <div><label>Item</label><select id="rep-item" onchange="renderReport()"></select></div>
      <div><label>Time Slot</label>
        <select id="rep-slot" onchange="renderReport()">
          <option value="all">All Slots (Total)</option>
          <option value="s1">1:00 PM</option>
          <option value="s2">7:00 PM</option>
          <option value="s3">10:00 PM</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px">
        <button class="btn" onclick="printReport()" style="flex:1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <button class="btn btn-img" onclick="downloadImage()" style="flex:1" id="dl-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Image
        </button>
      </div>
    </div>
    <!-- capture zone — only report tables, no buttons -->
    <div id="report-capture" style="background:var(--color-background-primary);padding:4px 0"></div>
  </div>

  <!-- MISSING -->
  <div id="missing" class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <p style="font-size:15px;font-weight:500">Missing Entries</p>
      <input type="date" id="miss-date" style="height:32px;padding:0 8px;width:160px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px" onchange="renderMissing()">
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem" id="miss-metrics"></div>
    <div id="miss-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const BRANCHES=["KRM","EC-KTR","KTR","INTL","HE","DVH","KH","BFD","KGL","MAJ","K-BEL","RJN","ARK","KNK","INDR","HSR","JYN","RTN","MDR","MSQ","K-KLN","K-MDP","K-SIR","CST","K-BNK","K-ECT","VSN","MYS","VJN","K-RRN","K-YLK","KLR","HSN","NXS","ORN","SLG","LULU","CBP","PMC","KPN","HSK"];
const ITEMS=[
  {id:"alfaham",label:"Alfaham"},
  {id:"tandoori",label:"Tandoori Chicken"},
  {id:"grill",label:"Grill Chicken"},
  {id:"butter",label:"Butter Chicken"},
  {id:"kabab",label:"Kabab Masala"},
  {id:"tandoori_ball",label:"Tandoori Ball (125g)"},
  {id:"parota_ball",label:"Parota Ball (125g)"}
];
const SLOTS=[{key:"s1",label:"1:00 PM"},{key:"s2",label:"7:00 PM"},{key:"s3",label:"10:00 PM"}];
const WA_NUMBERS={};
let entries=[];
try{entries=JSON.parse(localStorage.getItem('stockFinal')||'[]')}catch(e){}
function save(){try{localStorage.setItem('stockFinal',JSON.stringify(entries))}catch(e){}}
function today(){return new Date().toISOString().slice(0,10)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function switchTab(name){
  const tabs=['entry','dashboard','finalreport','missing'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='finalreport')renderReport();
  if(name==='missing')renderMissing();
}

function buildForm(){
  const sel=document.getElementById('branch-select');
  BRANCHES.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;sel.appendChild(o)});
  const di=document.getElementById('dash-item');
  ITEMS.forEach(item=>{const o=document.createElement('option');o.value=item.id;o.textContent=item.label;di.appendChild(o)});
  const ri=document.getElementById('rep-item');
  ITEMS.forEach(item=>{const o=document.createElement('option');o.value=item.id;o.textContent=item.label;ri.appendChild(o)});
  const db=document.getElementById('dash-branch');
  BRANCHES.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;db.appendChild(o)});
  const t=today();
  ['entry-date','dash-date','rep-date','miss-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=t});
  const c=document.getElementById('items-container');
  ITEMS.forEach(item=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${item.label}</div>`+
      SLOTS.map(s=>`<input type="number" min="0" placeholder="0" id="${item.id}_${s.key}" style="text-align:center">`).join('');
    c.appendChild(row);
  });
}

function clearForm(){
  document.getElementById('branch-select').value='';
  ITEMS.forEach(item=>SLOTS.forEach(s=>{const el=document.getElementById(`${item.id}_${s.key}`);if(el)el.value=''}));
}

function submitEntry(){
  const branch=document.getElementById('branch-select').value;
  const date=document.getElementById('entry-date').value;
  if(!branch){showToast('Please select a branch');return;}
  if(!date){showToast('Please select a date');return;}
  const data={branch,date,items:{}};
  ITEMS.forEach(item=>{
    data.items[item.id]={};
    SLOTS.forEach(s=>{data.items[item.id][s.key]=parseInt(document.getElementById(`${item.id}_${s.key}`).value)||0});
  });
  const idx=entries.findIndex(e=>e.branch===branch&&e.date===date);
  if(idx>=0)entries[idx]=data;else entries.push(data);
  save();showToast('Entry saved for '+branch);clearForm();
}

function renderDashboard(){
  const date=document.getElementById('dash-date').value;
  const selItem=document.getElementById('dash-item').value;
  const selBranch=document.getElementById('dash-branch').value;
  const selSlot=document.getElementById('dash-slot').value;
  let dayEntries=entries.filter(e=>e.date===date);
  if(selBranch!=='all')dayEntries=dayEntries.filter(e=>e.branch===selBranch);
  const submitted=entries.filter(e=>e.date===date).length;
  const missing=BRANCHES.length-submitted;
  let grandTotal=0;
  const activeSlots=selSlot==='all'?SLOTS:[SLOTS.find(s=>s.key===selSlot)].filter(Boolean);
  const activeItems=selItem==='all'?ITEMS:[ITEMS.find(i=>i.id===selItem)].filter(Boolean);
  dayEntries.forEach(e=>{activeItems.forEach(item=>activeSlots.forEach(s=>grandTotal+=(e.items[item.id]||{})[s.key]||0))});
  document.getElementById('metric-cards').innerHTML=`
    <div class="metric-card"><div class="metric-num">${submitted}</div><div class="metric-label">Submitted</div></div>
    <div class="metric-card"><div class="metric-num">${missing}</div><div class="metric-label">Missing</div></div>
    <div class="metric-card"><div class="metric-num">${BRANCHES.length}</div><div class="metric-label">Total Branches</div></div>
    <div class="metric-card"><div class="metric-num">${grandTotal}</div><div class="metric-label">${selItem==='all'?'All Items Total':'Item Total'}</div></div>`;
  const head=document.getElementById('dash-head');
  const body=document.getElementById('dash-body');
  if(selItem!=='all'){
    const item=ITEMS.find(i=>i.id===selItem);
    head.innerHTML=`<th>Branch</th>`+activeSlots.map(s=>`<th>${s.label}</th>`).join('')+`<th>Total</th><th>Status</th>`;
    body.innerHTML='';
    const slotTotals=activeSlots.map(()=>0);let overallTotal=0;
    BRANCHES.forEach(b=>{
      if(selBranch!=='all'&&b!==selBranch)return;
      const e=entries.find(x=>x.branch===b&&x.date===date);
      let rowTotal=0;
      const vals=activeSlots.map((s,i)=>{const v=(e?.items[item.id]||{})[s.key]||0;slotTotals[i]+=v;rowTotal+=v;overallTotal+=v;return v});
      const status=!e?`<span class="badge badge-miss">Not submitted</span>`:rowTotal===0?`<span class="badge badge-partial">No stock</span>`:`<span class="badge badge-ok">Submitted</span>`;
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-weight:500">${b}</td>`+vals.map(v=>`<td>${v}</td>`).join('')+`<td style="font-weight:500">${rowTotal}</td><td>${status}</td>`;
      body.appendChild(tr);
    });
    const tot=document.createElement('tr');tot.className='total-row';
    tot.innerHTML=`<td>TOTAL</td>`+slotTotals.map(v=>`<td>${v}</td>`).join('')+`<td>${overallTotal}</td><td></td>`;
    body.appendChild(tot);
    document.getElementById('branch-breakdown').innerHTML='';
    return;
  }
  head.innerHTML=`<th>Item</th>`+activeSlots.map(s=>`<th>${s.label}</th>`).join('')+`<th>Total</th>`;
  body.innerHTML='';
  activeItems.forEach(item=>{
    const slotVals=activeSlots.map(s=>dayEntries.reduce((a,e)=>a+((e.items[item.id]||{})[s.key]||0),0));
    const total=slotVals.reduce((a,b)=>a+b,0);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="font-weight:500">${item.label}</td>`+slotVals.map(v=>`<td>${v}</td>`).join('')+`<td style="font-weight:500">${total}</td>`;
    body.appendChild(tr);
  });
  const bb=document.getElementById('branch-breakdown');bb.innerHTML='';
  const fbranches=selBranch==='all'?BRANCHES:[selBranch];
  fbranches.forEach(b=>{
    const e=dayEntries.find(x=>x.branch===b);if(!e)return;
    const wrap=document.createElement('div');wrap.className='card';wrap.style.marginBottom='10px';
    let html=`<p style="font-size:14px;font-weight:500;margin-bottom:10px">${b}</p><div style="overflow-x:auto"><table class="report"><thead><tr><th>Item</th>`+activeSlots.map(s=>`<th>${s.label}</th>`).join('')+`<th>Total</th></tr></thead><tbody>`;
    activeItems.forEach(item=>{
      const vals=activeSlots.map(s=>(e.items[item.id]||{})[s.key]||0);
      const t=vals.reduce((a,b)=>a+b,0);
      html+=`<tr><td>${item.label}</td>`+vals.map(v=>`<td>${v}</td>`).join('')+`<td style="font-weight:500">${t}</td></tr>`;
    });
    html+=`</tbody></table></div>`;wrap.innerHTML=html;bb.appendChild(wrap);
  });
}

function buildReportTable(item, slotFilter, date){
  const slotLabel=slotFilter?slotFilter.label:'All Slots (Total)';
  const dateFormatted=date?new Date(date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'-';
  let total=0,rows='';
  BRANCHES.forEach(b=>{
    const e=entries.find(x=>x.branch===b&&x.date===date);
    const qty=slotFilter?(e?.items[item.id]||{})[slotFilter.key]||0:SLOTS.reduce((a,s)=>a+((e?.items[item.id]||{})[s.key]||0),0);
    total+=qty;
    rows+=`<tr style="${qty===0?'color:#999':''}"><td style="padding:7px 12px;border:1px solid #ddd;font-weight:500">${b}</td><td style="padding:7px 12px;border:1px solid #ddd">KG</td><td style="padding:7px 12px;border:1px solid #ddd;text-align:right">${qty}</td></tr>`;
  });
  return {slotLabel,dateFormatted,total,rows};
}

function renderReport(){
  const date=document.getElementById('rep-date').value;
  const selItem=document.getElementById('rep-item').value;
  const selSlot=document.getElementById('rep-slot').value;
  const item=ITEMS.find(i=>i.id===selItem)||ITEMS[0];
  const capture=document.getElementById('report-capture');
  capture.innerHTML='';

  const slotsToShow=selSlot==='all'?[null]:[SLOTS.find(s=>s.key===selSlot)].filter(Boolean);
  slotsToShow.forEach(slotFilter=>{
    const {slotLabel,dateFormatted,total,rows}=buildReportTable(item,slotFilter,date);
    const wrap=document.createElement('div');wrap.className='report-wrap';
    wrap.innerHTML=`
      <div class="report-title-bar">
        <span class="report-title">TGF Report — ${item.label}</span>
        <span style="font-size:12px;color:var(--color-text-secondary)">${dateFormatted} &nbsp;·&nbsp; <strong>${slotLabel}</strong></span>
      </div>
      <div style="overflow-x:auto">
        <table class="report">
          <thead><tr>
            <th style="width:40%">Branch</th>
            <th style="width:20%">UOM</th>
            <th style="width:40%;text-align:right">${item.label.toUpperCase()}</th>
          </tr></thead>
          <tbody>
            ${BRANCHES.map(b=>{
              const e=entries.find(x=>x.branch===b&&x.date===date);
              const qty=slotFilter?(e?.items[item.id]||{})[slotFilter.key]||0:SLOTS.reduce((a,s)=>a+((e?.items[item.id]||{})[s.key]||0),0);
              return `<tr class="${qty===0?'zero':''}"><td style="font-weight:500">${b}</td><td>KG</td><td style="text-align:right">${qty}</td></tr>`;
            }).join('')}
            <tr class="total-row"><td colspan="2">TOTAL</td><td style="text-align:right">${BRANCHES.reduce((sum,b)=>{
              const e=entries.find(x=>x.branch===b&&x.date===date);
              return sum+(slotFilter?(e?.items[item.id]||{})[slotFilter.key]||0:SLOTS.reduce((a,s)=>a+((e?.items[item.id]||{})[s.key]||0),0));
            },0)}</td></tr>
          </tbody>
        </table>
      </div>`;
    capture.appendChild(wrap);
  });

  if(selSlot==='all'){
    const div=document.createElement('p');
    div.style.cssText='font-size:13px;font-weight:500;color:var(--color-text-secondary);margin:1.5rem 0 10px';
    div.textContent='Per slot breakdown';
    capture.appendChild(div);
    SLOTS.forEach(slot=>{
      const wrap=document.createElement('div');wrap.className='report-wrap';
      let grandT=0;
      const rowsHtml=BRANCHES.map(b=>{
        const e=entries.find(x=>x.branch===b&&x.date===date);
        const qty=(e?.items[item.id]||{})[slot.key]||0;grandT+=qty;
        return `<tr class="${qty===0?'zero':''}"><td style="font-weight:500">${b}</td><td>KG</td><td style="text-align:right">${qty}</td></tr>`;
      }).join('');
      const dateFormatted=date?new Date(date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'-';
      wrap.innerHTML=`
        <div class="report-title-bar">
          <span class="report-title">${item.label}</span>
          <span style="font-size:12px;color:var(--color-text-secondary)">${dateFormatted} &nbsp;·&nbsp; <strong>${slot.label}</strong></span>
        </div>
        <div style="overflow-x:auto">
          <table class="report">
            <thead><tr><th style="width:40%">Branch</th><th style="width:20%">UOM</th><th style="width:40%;text-align:right">${item.label.toUpperCase()}</th></tr></thead>
            <tbody>${rowsHtml}<tr class="total-row"><td colspan="2">TOTAL</td><td style="text-align:right">${grandT}</td></tr></tbody>
          </table>
        </div>`;
      capture.appendChild(wrap);
    });
  }
}

function renderMissing(){
  const date=document.getElementById('miss-date').value;
  const submitted=new Set(entries.filter(e=>e.date===date).map(e=>e.branch));
  const missBranches=BRANCHES.filter(b=>!submitted.has(b));
  const partial=[],ok=[];
  submitted.forEach(b=>{
    const e=entries.find(x=>x.branch===b&&x.date===date);
    const hasAll=e&&ITEMS.every(item=>SLOTS.some(s=>(e.items[item.id]||{})[s.key]>0));
    hasAll?ok.push(b):partial.push(b);
  });
  document.getElementById('miss-metrics').innerHTML=`
    <div class="metric-card"><div class="metric-num" style="color:var(--color-text-danger)">${missBranches.length}</div><div class="metric-label">Not submitted</div></div>
    <div class="metric-card"><div class="metric-num" style="color:var(--color-text-warning)">${partial.length}</div><div class="metric-label">Partial</div></div>
    <div class="metric-card"><div class="metric-num" style="color:var(--color-text-success)">${ok.length}</div><div class="metric-label">Complete</div></div>`;
  const list=document.getElementById('miss-list');list.innerHTML='';
  if(!missBranches.length&&!partial.length){list.innerHTML='<div style="text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px">All branches submitted complete entries.</div>';return;}
  const makeSection=(title,branches,type)=>{
    if(!branches.length)return;
    const h=document.createElement('p');h.style.cssText='font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;margin-top:16px';h.textContent=title;list.appendChild(h);
    branches.forEach(b=>{
      const div=document.createElement('div');div.className='miss-card';
      const waId=`wa_${b.replace(/[^a-z0-9]/gi,'_')}`;
      div.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:14px;font-weight:500">${b}</span>
          <span class="badge badge-${type==='miss'?'miss':'partial'}">${type==='miss'?'Not submitted':'Partial'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="text" placeholder="+971xxxxxxxxx" id="${waId}" value="${WA_NUMBERS[b]||''}" style="width:150px;height:30px;font-size:13px" oninput="WA_NUMBERS['${b}']=this.value">
          <button class="btn btn-wa" onclick="sendWA('${b}','${date}','${waId}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.111.548 4.09 1.505 5.812L.057 23.012a.75.75 0 0 0 .93.93l5.2-1.448A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.809 9.809 0 0 1-5.012-1.375l-.36-.215-3.085.86.859-3.085-.215-.36A9.817 9.817 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
            WhatsApp
          </button>
        </div>`;
      list.appendChild(div);
    });
  };
  makeSection('Not submitted',missBranches,'miss');
  makeSection('Partial entries',partial,'partial');
}

function sendWA(branch,date,waId){
  const num=document.getElementById(waId).value.trim().replace(/[^0-9+]/g,'');
  if(!num){showToast('Enter WhatsApp number for '+branch);return;}
  const msg=encodeURIComponent(`Hi ${branch} team,\n\nYour stock entry for ${date} is pending.\nPlease submit at:\n• 1:00 PM\n• 7:00 PM\n• 10:00 PM\n\nThank you.`);
  const clean=num.startsWith('+')?num.slice(1):num;
  window.open(`https://wa.me/${clean}?text=${msg}`,'_blank');
}

function printReport(){
  const capture=document.getElementById('report-capture');
  if(!capture.innerHTML.trim()){showToast('No report to print');return;}
  const win=window.open('','_blank');
  win.document.write(`<html><head><title>TGF Stock Report</title><style>
    body{font-family:Arial,sans-serif;font-size:13px;padding:20px;color:#111}
    .report-wrap{border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:20px}
    .report-title-bar{padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}
    table{width:100%;border-collapse:collapse}
    th,td{padding:7px 12px;border-bottom:1px solid #eee;text-align:left}
    th{background:#fafafa;font-weight:600;color:#555}
    tr.zero td{color:#aaa}
    tr.total-row td{font-weight:700;background:#f5f5f5;border-top:1px solid #ddd}
    @media print{button{display:none}}
  </style></head><body>`);
  win.document.write('<button onclick="window.print()" style="margin-bottom:16px;padding:8px 18px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#fff">Print</button>');
  win.document.write(capture.innerHTML);
  win.document.write('</body></html>');
  win.document.close();
}

function downloadImage(){
  const capture=document.getElementById('report-capture');
  if(!capture.innerHTML.trim()){showToast('Generate a report first');return;}
  const btn=document.getElementById('dl-btn');
  btn.textContent='Generating…';btn.disabled=true;
  html2canvas(capture,{
    backgroundColor:'#ffffff',
    scale:2,
    useCORS:true,
    logging:false
  }).then(canvas=>{
    const link=document.createElement('a');
    const date=document.getElementById('rep-date').value||today();
    const item=document.getElementById('rep-item').value||'report';
    link.download=`TGF_Report_${item}_${date}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Image';
    btn.disabled=false;
    showToast('Image downloaded!');
  }).catch(()=>{
    showToast('Download failed, try Print instead');
    btn.innerHTML='Image';btn.disabled=false;
  });
}

buildForm();
</script>
